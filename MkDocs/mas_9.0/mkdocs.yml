site_name: MAS 9.0 概览实验
site_url: https://ibm.github.io/maximo-labs/
site_author: Carlos Ferreira & Contributors
site_description: "Maximo Application Suite 9.0 概览动手实验"
site_dir: ../../site/mas_9.0

nav:
  - 返回 Maximo Labs: ..
  - MAS 9.0 概览实验:
    - 欢迎: index.md
    - 先决条件: prereqs.md
  - 练习:
    - 1. 可靠性策略: demo-rsl.md
    - 2. Monitor: demo-monitor.md
    - 3. 视觉检查: demo-mvi.md
    - 4. Manage: demo-manage.md
    - 5. Mobile: demo-mobile-assist.md
    - 6. Health - Predict: demo-health-predict.md
    - 7. 结束: closing.md 
    - 实验清理: clean.md
  - 关于:
    - 发布说明: release_notes.md
    - 版权: ../copyright

theme:
  name: readthedocs
  analytics:
    gtag: G-EGH6ZGZ8CT
  highlightjs: true
  hljs_languages:
    - yaml

markdown_extensions:
  - attr_list
  - admonition

extra_css:
  - ../css/extra.css

extra_javascript:
  - ../js/popper.min.js
  - ../js/tippy-bundle.umd.js
  - ../js/clipboard.js
  - ../js/extra.js

